<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIDIGrama — Centro de Operaciones</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- LOGIN -->
  <section id="login-screen" class="login-screen">
    <div class="login-card glass">
      <h1 class="brand">MIDI<span>Grama</span></h1>
      <p class="subtitle">Centro de Operaciones Diario</p>
      <div id="user-grid" class="user-grid"></div>
      <div id="pin-pad" class="pin-pad hidden">
        <p class="pin-label">Hola, <strong id="pin-user-name"></strong> — escribí tu PIN</p>
        <form id="pin-form" class="pin-form" autocomplete="off">
          <input id="pin-input" class="pin-input" type="password" inputmode="numeric"
                 maxlength="4" autocomplete="off" placeholder="• • • •" aria-label="PIN" />
          <button type="submit" class="btn-primary" id="pin-submit">Ingresar</button>
        </form>
        <button type="button" class="btn-ghost" id="pin-back">← Cambiar usuario</button>
      </div>
    </div>
    <div class="mode-badge" id="mode-badge"></div>
  </section>

  <!-- APP -->
  <section id="app-screen" class="app-screen hidden">
    <header class="topbar glass">
      <div class="topbar-left">
        <span class="brand-sm">MIDI<span>Grama</span></span>
        <span class="user-chip" id="current-user-chip"></span>
      </div>
      <nav class="tabs" id="tabs"></nav>
      <div class="topbar-right">
        <span class="today-label" id="today-label"></span>
        <button class="btn-ghost" id="logout-btn">Salir</button>
      </div>
    </header>

    <main id="view-container" class="view-container"></main>
  </section>

  <div id="toast" class="toast hidden"></div>
  <div id="modal-root"></div>

  <!-- Supabase JS (CDN). Si no hay credenciales en config.js, la app usa modo local. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
